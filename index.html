<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shalom Enterprise Limo — Luxury Transportation</title>
    <meta
      name="description"
      content="Premium chauffeured limousine service across Dallas–Fort Worth. Airport transfers, weddings, corporate travel and special events."
    />

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      window.EMAILJS_PUBLIC_KEY = "qM2vasRzsvFBh5Uhh";
      window.EMAILJS_SERVICE_ID = "service_w1jdzws";
      window.EMAILJS_TEMPLATE_ID = "template_88z0vag";
      emailjs.init(window.EMAILJS_PUBLIC_KEY);
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── PROMO TICKER ── */
      @keyframes ticker-scroll {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      .promo-ticker-wrap {
        width: 100%;
        overflow: hidden;
        background: var(--forest);
        border-top: 2px solid var(--gold);
        border-bottom: 2px solid var(--gold);
        padding: 0;
        position: relative;
        z-index: 10;
      }
      .promo-ticker-track {
        display: inline-flex;
        white-space: nowrap;
        animation: ticker-scroll 28s linear infinite;
        will-change: transform;
      }
      .promo-ticker-wrap:hover .promo-ticker-track {
        animation-play-state: paused;
      }
      .promo-ticker-item {
        display: inline-flex;
        align-items: center;
        padding: 0.72rem 2.2rem;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 0.88rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold-lt);
      }
      .promo-ticker-item strong {
        color: #fff;
        font-weight: 700;
      }
      .promo-ticker-dot {
        color: var(--gold);
        opacity: 0.55;
        font-size: 0.75rem;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ── TOKENS ── */
      :root {
        --cream: #f9f5ef;
        --cream2: #f2ede3;
        --white: #ffffff;
        --forest: #1b2f21;
        --forest2: #2c4a35;
        --gold: #b8860b;
        --gold-lt: #d4a843;
        --gold-pale: #f0e2c0;
        --text: #1e1a14;
        --muted: #7a6b5c;
        --soft: #b0a090;
        --border: rgba(27, 47, 33, 0.11);
        --border-gold: rgba(184, 134, 11, 0.25);
        --shadow-sm: 0 2px 12px rgba(27, 47, 33, 0.07);
        --shadow-md: 0 8px 32px rgba(27, 47, 33, 0.1);
        --shadow-lg: 0 20px 60px rgba(27, 47, 33, 0.13);
      }

      /* ── RESET ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }
      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.65;
        overflow-x: hidden;
        max-width: 100vw;
      }

      /* ── TYPE ── */
      .serif {
        font-family: "Cormorant Garamond", Georgia, serif;
      }

      /* ── LAYOUT ── */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      .container--narrow {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      .container--mid {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      section {
        padding: 4.5rem 0;
      }
      section[id] {
        scroll-margin-top: 80px;
      }

      /* ── BUTTONS ── */
      .btn {
        display: inline-block;
        cursor: pointer;
        border: none;
        font-family: "Inter", sans-serif;
        text-decoration: none;
        letter-spacing: 0.04em;
        font-size: 0.8125rem;
        font-weight: 600;
        transition: all 0.22s ease;
        border-radius: 4px;
      }
      .btn-dark {
        background: var(--forest);
        color: #fff;
        padding: 0.85rem 2rem;
        box-shadow: 0 4px 20px rgba(27, 47, 33, 0.25);
      }
      .btn-dark:hover {
        background: var(--forest2);
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(27, 47, 33, 0.3);
      }
      .btn-gold {
        background: linear-gradient(135deg, #d4a843 0%, #b8860b 100%);
        color: #fff;
        padding: 0.85rem 2rem;
        box-shadow: 0 4px 20px rgba(184, 134, 11, 0.3);
      }
      .btn-gold:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }
      .btn-outline {
        border: 1.5px solid var(--forest);
        color: var(--forest);
        padding: 0.8rem 2rem;
        background: transparent;
      }
      .btn-outline:hover {
        background: var(--forest);
        color: #fff;
      }
      .btn-outline-gold {
        border: 1.5px solid var(--gold);
        color: var(--gold);
        padding: 0.8rem 2rem;
        background: transparent;
      }
      .btn-outline-gold:hover {
        background: var(--gold);
        color: #fff;
      }

      /* ── LABEL ── */
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.68rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 500;
        margin-bottom: 1rem;
      }
      .eyebrow::before,
      .eyebrow::after {
        content: "";
        display: block;
        width: 24px;
        height: 1px;
        background: var(--gold-lt);
        opacity: 0.6;
      }

      /* ── CARDS ── */
      .card {
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
        overflow: hidden;
      }

      /* ── DIVIDER ── */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border-gold),
          transparent
        );
        border: none;
        margin: 0;
      }

      /* ── GOLD RULE ── */
      .gold-rule {
        width: 48px;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-lt));
        border-radius: 2px;
        margin-bottom: 1.5rem;
      }

      /* ── LOGO LOCK ── */
      .nav-logo-circle {
        width: 40px !important;
        height: 40px !important;
        flex-shrink: 0 !important;
      }
      .nav-logo-name {
        font-weight: 600 !important;
        font-size: 1.05rem !important;
        letter-spacing: 0.02em !important;
        white-space: nowrap;
      }
      .nav-logo-sub {
        display: block !important;
        font-size: 0.6rem !important;
        letter-spacing: 0.28em !important;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .nav-link {
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        transition: color 0.2s;
        font-weight: 500;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: #fff;
      }
      .nav-link-dark {
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
        font-weight: 500;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .nav-link-dark:hover {
        color: var(--forest);
      }

      /* ── FORM ── */
      .field {
        width: 100%;
        background: var(--cream);
        border: 1.5px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 0.8rem 1rem;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
      }
      .field::placeholder {
        color: var(--soft);
      }
      .field:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.12);
        background: var(--white);
      }
      .field option {
        background: var(--white);
        color: var(--text);
      }

      /* ── TABLE ── */
      .rate-table {
        width: 100%;
        border-collapse: collapse;
      }
      .rate-table th {
        text-align: left;
        padding: 1rem 1.25rem;
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 600;
        border-bottom: 1px solid var(--border-gold);
        background: var(--cream2);
      }
      .rate-table td {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }
      .rate-table tr:last-child td {
        border-bottom: none;
      }
      .rate-table tbody tr {
        transition: background 0.15s;
      }
      .rate-table tbody tr:hover td {
        background: var(--cream);
      }
      .rate-table .vname {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.05rem;
        color: var(--forest);
        font-weight: 600;
      }

      /* ── FLEET IMAGE ── */
      .fleet-img {
        width: 100%;
        aspect-ratio: 3/2;
        object-fit: cover;
        display: block;
        transition: transform 0.45s ease;
      }
      .fleet-card:hover .fleet-img {
        transform: scale(1.04);
      }

      /* ── ACCORDION ── */
      details {
        border-bottom: 1px solid var(--border);
      }
      details:last-child {
        border-bottom: none;
      }
      details > summary {
        list-style: none;
        cursor: pointer;
        padding: 1.1rem 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.9375rem;
        color: var(--forest);
        font-weight: 500;
        user-select: none;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      .chev {
        transition: transform 0.2s;
        color: var(--gold);
        flex-shrink: 0;
      }
      details[open] .chev {
        transform: rotate(180deg);
      }
      details > div {
        padding-bottom: 1rem;
        font-size: 0.875rem;
        color: var(--muted);
        line-height: 1.75;
      }

      /* ── HERO ── */
      .hero-wrap {
        position: relative;
        min-height: 80svh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden;
      }
      @media (max-width: 768px) {
        .hero-wrap {
          min-height: 75svh;
        }
      }
      @media (max-width: 480px) {
        .hero-wrap {
          min-height: 70svh;
        }
      }
      @media (max-width: 375px) {
        .hero-wrap {
          min-height: 65svh;
        }
      }

      .hero-bg-img {
        position: absolute;
        inset: 0;
        background: url("./hero.webp") center top / cover no-repeat;
        background-attachment: scroll;
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            90deg,
            rgba(5, 8, 6, 0.72) 0%,
            rgba(5, 8, 6, 0.45) 38%,
            rgba(5, 8, 6, 0.1) 60%,
            transparent 100%
          ),
          linear-gradient(
            180deg,
            rgba(10, 20, 12, 0.5) 0%,
            rgba(10, 20, 12, 0.2) 35%,
            rgba(10, 20, 12, 0.5) 65%,
            rgba(249, 245, 239, 1) 100%
          );
      }
      .hero-content {
        position: relative;
        padding: 6rem 0 4rem;
        text-align: center;
      }

      /* ── STAT BAR ── */
      .stat-bar {
        display: flex;
        gap: 0;
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .stat-item {
        flex: 1;
        padding: 1.5rem 1rem;
        text-align: center;
        border-right: 1px solid var(--border);
      }
      .stat-item:last-child {
        border-right: none;
      }

      /* ── SERVICE GRID ── */
      .service-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
        gap: 1.5px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .service-cell {
        background: var(--white);
        padding: 2rem 1.75rem;
        transition: background 0.2s;
        cursor: default;
      }
      .service-cell:hover {
        background: var(--cream);
      }

      /* ── FLEET GRID ── */
      .fleet-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      /* ── ZERO TOLERANCE ACCORDION ── */
      .zt-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .zt-item:last-child {
        border-bottom: none;
      }
      .zt-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 0;
        cursor: pointer;
        font-size: 0.9375rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        user-select: none;
        list-style: none;
      }
      .zt-summary::-webkit-details-marker {
        display: none;
      }
      .zt-chev {
        transition: transform 0.2s;
        color: var(--gold-lt);
        flex-shrink: 0;
      }
      .zt-item[open] .zt-chev {
        transform: rotate(180deg);
      }
      .zt-body {
        padding-bottom: 1rem;
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.8;
      }

      /* ── NAV BAR RESPONSIVE ── */
      .nav-inner {
        height: 76px;
        padding: 0 clamp(1rem, 4vw, 2.5rem);
      }
      @media (max-width: 768px) {
        .nav-inner {
          height: 66px;
        }
      }
      @media (max-width: 480px) {
        .nav-inner {
          height: 62px;
        }
      }
      @media (max-width: 375px) {
        .nav-inner {
          height: 58px;
        }
        .mobile-btn {
          padding: 0.38rem 0.5rem !important;
        }
      }
      @media (max-width: 320px) {
        .nav-inner {
          height: 54px;
        }
      }

      /* ── RESPONSIVE NAV ── */
      @media (max-width: 768px) {
        .desktop-nav {
          display: none !important;
        }
        .mobile-btn {
          display: flex !important;
        }
        section {
          padding: 2.75rem 0;
        }
        .hero-content {
          padding: 6rem 0 3rem;
        }
        .book-card {
          padding: 1.75rem !important;
        }
        .rate-table th,
        .rate-table td {
          padding: 0.85rem 0.9rem;
          font-size: 0.85rem;
        }
        .grid-map {
          gap: 1.75rem !important;
        }
      }
      @media (min-width: 769px) {
        .mobile-btn {
          display: none !important;
        }
      }

      /* ── NAV 769–1023px ── */
      @media (min-width: 769px) and (max-width: 1023px) {
        .nav-inner {
          justify-content: center !important;
          gap: 1.25rem;
          padding: 0 1.25rem !important;
        }
        .desktop-nav {
          gap: 0.75rem !important;
        }
        .nav-link,
        .nav-link-dark {
          font-size: 0.66rem;
          letter-spacing: 0.035em;
          white-space: nowrap;
        }
        .desktop-nav .btn {
          padding: 0.5rem 1rem !important;
          font-size: 0.68rem !important;
          white-space: nowrap;
        }
      }

      /* ── NAV 1024–1100px ── */
      @media (min-width: 1024px) and (max-width: 1100px) {
        .desktop-nav {
          gap: 1rem !important;
        }
        .nav-link,
        .nav-link-dark {
          font-size: 0.7rem;
          letter-spacing: 0.04em;
          white-space: nowrap;
        }
        .desktop-nav .btn {
          padding: 0.55rem 1.1rem !important;
          font-size: 0.72rem !important;
        }
        .container {
          padding: 0 1.25rem;
        }
      }

      /* ── SURFACE PRO 7 portrait ── */
      @media (min-width: 769px) and (max-width: 960px) {
        .nav-inner {
          height: 70px !important;
          padding: 0 1.25rem !important;
        }
        section {
          padding: 3.5rem 0;
        }
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 1.5rem;
        }
        .btn {
          min-height: 44px;
        }
        .field {
          min-height: 44px;
          font-size: 1rem;
        }
        .stat-bar {
          flex-wrap: nowrap !important;
        }
        .stat-item {
          flex: 1 !important;
          border-right: 1px solid var(--border) !important;
          border-bottom: none !important;
        }
        .stat-item:last-child {
          border-right: none !important;
        }
        .service-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .fleet-grid {
          grid-template-columns: repeat(
            auto-fit,
            minmax(340px, 1fr)
          ) !important;
        }
        .grid-2col {
          grid-template-columns: 1fr 1fr !important;
        }
        .grid-3col {
          grid-template-columns: 1fr 1fr 1fr !important;
        }
        .grid-map {
          grid-template-columns: 1fr 1fr !important;
        }
        .book-card {
          padding: 2rem !important;
        }
      }

      /* ── Surface Pro landscape ── */
      @media (min-width: 961px) and (max-width: 1400px) {
        .nav-inner {
          height: 72px !important;
        }
        .container {
          max-width: 1200px;
        }
        .container--narrow {
          max-width: 820px;
        }
        .container--mid {
          max-width: 980px;
        }
        .btn {
          min-height: 44px;
        }
        .field {
          min-height: 44px;
        }
        .service-grid {
          grid-template-columns: repeat(3, 1fr) !important;
        }
        .fleet-grid {
          grid-template-columns: repeat(
            auto-fit,
            minmax(340px, 1fr)
          ) !important;
        }
      }

      /* ── Surface Duo folded ── */
      @media (min-width: 481px) and (max-width: 540px) {
        .nav-inner {
          height: 64px !important;
          padding: 0 1.25rem !important;
        }
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 1.25rem;
        }
        section {
          padding: 2.75rem 0;
        }
        .grid-2col {
          grid-template-columns: 1fr 1fr !important;
        }
        .service-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .hero-ctas {
          flex-direction: row !important;
          align-items: stretch !important;
          padding: 0 0.25rem;
        }
        .hero-ctas a {
          flex: 1 !important;
          width: auto !important;
        }
        .stat-bar {
          flex-wrap: nowrap !important;
        }
        .stat-item {
          flex: 1 !important;
          border-right: 1px solid var(--border) !important;
          border-bottom: none !important;
        }
        .stat-item:last-child {
          border-right: none !important;
        }
        .stat-item .serif {
          font-size: 1.5rem !important;
        }
        .book-card {
          padding: 1.5rem !important;
        }
        .map-iframe {
          height: 300px !important;
        }
      }

      /* ── Surface Duo unfolded ── */
      @media (horizontal-viewport-segments: 2) {
        .hero-wrap {
          grid-column: span 2;
        }
        .grid-map {
          grid-template-columns: env(viewport-segment-width, 0, 0) env(
              viewport-segment-width,
              1,
              0
            ) !important;
          column-gap: calc(
            env(viewport-segment-right, 0, 0) - env(viewport-segment-left, 1, 0)
          ) !important;
        }
        .book-card {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 2rem;
        }
      }
      @media (spanning: single-fold-vertical) {
        .grid-map {
          grid-template-columns: env(fold-left) 1fr !important;
          column-gap: calc(100vw - env(fold-left) - env(fold-right)) !important;
        }
        .hero-content {
          padding-left: calc(env(fold-left) + 2rem) !important;
          padding-right: calc(env(fold-right) + 2rem) !important;
        }
      }

      /* ── STAT BAR 2×2 on tablet/mobile ── */
      @media (max-width: 768px) {
        .stat-bar {
          flex-wrap: wrap;
        }
        .stat-item {
          flex: 0 0 50%;
          border-right: none !important;
          border-bottom: 1px solid var(--border);
        }
        .stat-item:nth-child(odd) {
          border-right: 1px solid var(--border) !important;
        }
        .stat-item:nth-child(3),
        .stat-item:nth-child(4) {
          border-bottom: none !important;
        }
      }

      /* ── RATE TABLE scroll ── */
      .rate-table-wrap {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* ── GRID HELPERS ── */
      .grid-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .grid-3col {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1rem;
      }
      .grid-map {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2.5rem;
        align-items: start;
      }
      .grid-fees {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .grid-footer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 2.5rem;
        margin-bottom: 3rem;
      }

      @media (max-width: 768px) {
        .grid-2col {
          grid-template-columns: 1fr !important;
        }
        .grid-3col {
          grid-template-columns: 1fr 1fr !important;
        }
        .grid-map {
          grid-template-columns: 1fr !important;
        }
        .grid-fees {
          grid-template-columns: 1fr !important;
        }
        .footer-brand {
          grid-column: span 1 !important;
        }
        .book-card {
          padding: 1.5rem !important;
        }
      }
      @media (max-width: 480px) {
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 1.1rem;
        }
        .grid-3col {
          grid-template-columns: 1fr !important;
        }
        .book-card {
          padding: 1.25rem !important;
        }
        .stat-item {
          padding: 1.1rem 0.5rem;
        }
        .stat-item .serif {
          font-size: 1.4rem !important;
        }
        .map-iframe {
          height: 260px !important;
        }
        .hero-ctas {
          flex-direction: column !important;
          align-items: stretch !important;
          padding: 0 0.5rem;
        }
        .hero-ctas a {
          text-align: center !important;
          width: 100% !important;
        }
        .footer-brand {
          grid-column: span 1 !important;
        }
        .zt-summary {
          font-size: 0.875rem;
        }
        section h2 {
          font-size: clamp(1.9rem, 7vw, 3.25rem) !important;
        }
        .hero-eyebrow-lines {
          display: none;
        }
      }

      /* ── COVERAGE TAGS ── */
      .coverage-tag {
        display: inline-block;
        padding: 0.4rem 0.9rem;
        border-radius: 20px;
        border: 1px solid rgba(212, 168, 67, 0.28);
        font-size: 0.8125rem;
        color: var(--soft);
        background: var(--cream);
        font-weight: 400;
        letter-spacing: 0.02em;
        cursor: default;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.18s ease,
          box-shadow 0.2s ease;
      }
      .coverage-tag:hover {
        background: var(--gold-pale);
        border-color: var(--gold-lt);
        color: var(--forest);
        transform: translateY(-2px);
        box-shadow: 0 4px 14px rgba(184, 134, 11, 0.18);
      }

      .map-iframe {
        width: 100%;
        display: block;
        border: 0;
        filter: grayscale(20%) contrast(1.05);
      }

      /* ── iPhone safe-area ── */
      @supports (padding-bottom: env(safe-area-inset-bottom)) {
        footer {
          padding-bottom: calc(2.5rem + env(safe-area-inset-bottom));
        }
      }

      /* ── Mobile tap targets ── */
      @media (max-width: 768px) {
        .btn {
          min-height: 48px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .field {
          min-height: 48px;
          font-size: 1rem;
        }
        select.field {
          font-size: 1rem;
        }
        .hero-ctas {
          flex-direction: column !important;
          align-items: stretch !important;
          padding: 0 0.5rem;
        }
        .hero-ctas a {
          text-align: center !important;
          width: 100% !important;
          box-sizing: border-box;
        }
      }

      /* ── iPhone SE ── */
      @media (max-width: 375px) {
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 1rem;
        }
        section {
          padding: 2rem 0;
        }
        .hero-content {
          padding-left: 1rem !important;
          padding-right: 1rem !important;
          padding-bottom: 3rem !important;
        }
        .stat-item {
          padding: 0.85rem 0.4rem;
        }
        .stat-item .serif {
          font-size: 1.2rem !important;
        }
        .promo-ticker-item {
          padding: 0.6rem 1.2rem;
          font-size: 0.78rem;
          letter-spacing: 0.12em;
        }
        section h2 {
          font-size: clamp(1.75rem, 6.5vw, 3.25rem) !important;
        }
        .book-card {
          padding: 1rem !important;
        }
        .zt-item-wrap {
          padding-left: 1rem !important;
          padding-right: 1rem !important;
        }
        .coverage-tag {
          padding: 0.3rem 0.65rem;
          font-size: 0.75rem;
        }
        .map-iframe {
          height: 220px !important;
        }
        .btn {
          font-size: 0.8125rem;
        }
        .zt-summary {
          font-size: 0.875rem;
          padding: 1rem 0;
        }
        .footer-brand {
          grid-column: span 1 !important;
        }
        .field {
          padding: 0.75rem 0.85rem;
          min-height: 44px;
        }
        .hero-ctas {
          margin-bottom: 2.5rem !important;
        }
      }

      /* ── Very small phones ── */
      @media (max-width: 320px) {
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 0.75rem;
        }
        .hero-content {
          padding-left: 0.75rem !important;
          padding-right: 0.75rem !important;
          padding-bottom: 2.5rem !important;
        }
        section {
          padding: 1.75rem 0;
        }
        .stat-item .serif {
          font-size: 1.05rem !important;
        }
        .stat-item {
          padding: 0.75rem 0.3rem;
        }
        .book-card {
          padding: 0.85rem !important;
        }
        .zt-item-wrap {
          padding-left: 0.75rem !important;
          padding-right: 0.75rem !important;
        }
        section h2 {
          font-size: clamp(1.6rem, 6vw, 3.25rem) !important;
        }
        .btn {
          font-size: 0.78rem;
        }
        .promo-ticker-item {
          font-size: 0.7rem;
          padding: 0.5rem 1rem;
          letter-spacing: 0.1em;
        }
        .map-iframe {
          height: 190px !important;
        }
      }

      /* ── Field wrap (iOS date/time fix) ── */
      .field-wrap {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .field-wrap .field-label {
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0.55rem 0.9rem 0;
        background: var(--cream);
        border: 1px solid var(--border);
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        line-height: 1;
        pointer-events: none;
        user-select: none;
      }
      .field-wrap .field {
        border-radius: 0 0 6px 6px !important;
        padding-top: 0.3rem !important;
      }

      /* ── HERO DESKTOP LEFT-ALIGN ── */
      @media (min-width: 769px) {
        .hero-content {
          text-align: left !important;
        }
        .hero-eyebrow-wrap {
          justify-content: flex-start !important;
        }
        .hero-content h1 {
          text-align: left !important;
        }
        .hero-content p {
          text-align: left !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
        }
        .hero-ctas {
          justify-content: flex-start !important;
        }
        .stat-bar {
          max-width: 580px;
          margin-left: auto !important;
          margin-right: auto !important;
        }
      }

      /* ── NAV TAGLINE STRIP ── */
      .nav-tagline-strip {
        display: none;
        text-align: center;
        font-size: 0.575rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-weight: 500;
        padding: 3px 0 5px;
      }
      .nav-tagline-at-top {
        color: rgba(255, 255, 255, 0.45);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .nav-tagline-scrolled {
        color: var(--soft);
        border-top: 1px solid var(--border);
      }
      @media (min-width: 769px) {
        .nav-tagline-strip {
          display: block;
        }
      }

      /* ── MOBILE BOOK BTN IN NAV ── */
      .mobile-book-nav {
        display: none;
      }
      @media (max-width: 768px) {
        .mobile-book-nav {
          display: none !important;
        }
      }

      /* ── MOBILE HERO CTA SIDE-BY-SIDE ── */
      @media (min-width: 420px) and (max-width: 768px) {
        .hero-ctas {
          flex-direction: row !important;
          flex-wrap: nowrap !important;
        }
        .hero-ctas a {
          flex: 1 !important;
          width: auto !important;
          text-align: center !important;
        }
      }

      /* ── STAT ICONS ── */
      .stat-icon {
        width: 22px;
        height: 22px;
        margin: 0 auto 0.45rem;
        display: block;
        color: var(--gold);
        opacity: 0.75;
        flex-shrink: 0;
      }
      @media (min-width: 769px) {
        .stat-icon {
          display: none;
        }
      }

      /* ── PROMO CARD SECTION ── */
      .promo-card-section {
        background: var(--white);
        padding: 2.25rem 0;
        text-align: center;
        border-top: 2px solid var(--gold);
        border-bottom: 1px solid var(--border);
      }

      /* ── SERVICE ICON ROW (mobile) ── */
      .service-icon-row {
        display: none;
      }
      @media (max-width: 768px) {
        .service-icon-row {
          display: flex;
          justify-content: center;
          gap: 1.5rem;
          margin-bottom: 2rem;
        }
      }
      .service-icon-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        text-decoration: none;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
      }
      .service-icon-circle {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 1.5px solid var(--border-gold);
        background: var(--cream);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gold);
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .service-icon-btn:hover .service-icon-circle,
      .service-icon-btn:active .service-icon-circle {
        background: var(--gold-pale);
        border-color: var(--gold-lt);
      }
      .service-icon-label {
        font-size: 0.62rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 500;
        text-align: center;
        max-width: 60px;
        line-height: 1.3;
      }

      /* ── DATE / TIME FIELD: center on all browsers incl. iOS Safari ── */
      input[type="date"].field,
      input[type="time"].field {
        -webkit-appearance: none;
        appearance: none;
        text-align: center;
        text-align-last: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      input[type="date"].field::-webkit-date-and-time-value,
      input[type="time"].field::-webkit-date-and-time-value {
        text-align: center;
        width: 100%;
      }

      /* ── MOBILE HERO CONTENT: clear fixed navbar ── */
      @media (max-width: 768px) {
        .hero-content {
          padding-top: 5rem !important; /* clears 66px navbar + breathing room */
        }
      }

      /* ── MOBILE HERO BG: full image visible ── */
      @media (max-width: 768px) {
        .hero-bg-img {
          background-size: contain;
          background-position: center center;
          background-color: #080c0a;
        }
      }

      /* ── MOBILE HERO CTA BUTTONS: smaller size ── */
      @media (max-width: 768px) {
        .hero-ctas .btn {
          padding: 0.55rem 1.1rem !important;
          font-size: 0.78rem !important;
          min-height: 40px !important;
        }
      }

      /* ── PHONE LANDSCAPE: keep nav + hero symmetric (iPhone Pro Max etc.) ── */
      @media (max-height: 500px) and (orientation: landscape) {
        .desktop-nav {
          display: none !important;
        }
        .mobile-btn {
          display: flex !important;
        }
        .nav-tagline-strip {
          display: none !important;
        }
        .nav-inner {
          height: 58px !important;
          justify-content: space-between !important;
          padding: 0 1.25rem !important;
        }
        .hero-content {
          margin-top: 100px !important;
          padding-left: 1rem !important;
          padding-right: 1rem !important;
        }
        .hero-content,
        .hero-content h1,
        .hero-content p {
          text-align: center !important;
        }
        .hero-content p {
          margin-left: auto !important;
          margin-right: auto !important;
        }
        .hero-ctas {
          justify-content: center !important;
        }
        .stat-bar {
          margin-left: auto !important;
          margin-right: auto !important;
        }
      }
