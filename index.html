<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shalom Enterprise Limo — Luxury Transportation</title>
    <meta
      name="description"
      content="Premium chauffeured limousine service across Dallas–Fort Worth. Airport transfers, weddings, corporate travel and special events."
    />

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      // ── EMAILJS CONFIG ──────────────────────────────────────────────
      // Replace these three values with your own from emailjs.com
      // (Account → API Keys for the Public Key;
      //  Email Services for the Service ID;
      //  Email Templates for the Template ID)
      window.EMAILJS_PUBLIC_KEY = "T5TnI2xfX56JfIgaU";
      window.EMAILJS_SERVICE_ID = "service_ovc8b3d";
      window.EMAILJS_TEMPLATE_ID = "template_rironoo";
      // ────────────────────────────────────────────────────────────────
      emailjs.init(window.EMAILJS_PUBLIC_KEY);
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── PROMO TICKER ── */
      @keyframes ticker-scroll {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .promo-ticker-wrap {
        width: 100%;
        overflow: hidden;
        background: var(--forest);
        border-top: 2px solid var(--gold);
        border-bottom: 2px solid var(--gold);
        padding: 0;
        position: relative;
        z-index: 10;
      }

      .promo-ticker-track {
        display: inline-flex;
        white-space: nowrap;
        animation: ticker-scroll 28s linear infinite;
        will-change: transform;
      }

      .promo-ticker-wrap:hover .promo-ticker-track {
        animation-play-state: paused;
      }

      .promo-ticker-item {
        display: inline-flex;
        align-items: center;
        padding: 0.72rem 2.2rem;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 0.88rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold-lt);
      }

      .promo-ticker-item strong {
        color: #fff;
        font-weight: 700;
      }

      .promo-ticker-dot {
        color: var(--gold);
        opacity: 0.55;
        font-size: 0.75rem;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ── TOKENS ── */
      :root {
        --cream: #f9f5ef;
        --cream2: #f2ede3;
        --white: #ffffff;
        --forest: #1b2f21;
        --forest2: #2c4a35;
        --gold: #b8860b;
        --gold-lt: #d4a843;
        --gold-pale: #f0e2c0;
        --text: #1e1a14;
        --muted: #7a6b5c;
        --soft: #b0a090;
        --border: rgba(27, 47, 33, 0.11);
        --border-gold: rgba(184, 134, 11, 0.25);
        --shadow-sm: 0 2px 12px rgba(27, 47, 33, 0.07);
        --shadow-md: 0 8px 32px rgba(27, 47, 33, 0.1);
        --shadow-lg: 0 20px 60px rgba(27, 47, 33, 0.13);
      }

      /* ── RESET ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }
      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.65;
        overflow-x: hidden;
        max-width: 100vw;
      }

      /* ── TYPE ── */
      .serif {
        font-family: "Cormorant Garamond", Georgia, serif;
      }

      /* ── LAYOUT ── */
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      .container--narrow {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      .container--mid {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      section {
        padding: 7rem 0;
      }
      section[id] {
        scroll-margin-top: 80px;
      }

      /* ── BUTTONS ── */
      .btn {
        display: inline-block;
        cursor: pointer;
        border: none;
        font-family: "Inter", sans-serif;
        text-decoration: none;
        letter-spacing: 0.04em;
        font-size: 0.8125rem;
        font-weight: 600;
        transition: all 0.22s ease;
        border-radius: 4px;
      }
      .btn-dark {
        background: var(--forest);
        color: #fff;
        padding: 0.85rem 2rem;
        box-shadow: 0 4px 20px rgba(27, 47, 33, 0.25);
      }
      .btn-dark:hover {
        background: var(--forest2);
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(27, 47, 33, 0.3);
      }

      .btn-gold {
        background: linear-gradient(135deg, #d4a843 0%, #b8860b 100%);
        color: #fff;
        padding: 0.85rem 2rem;
        box-shadow: 0 4px 20px rgba(184, 134, 11, 0.3);
      }
      .btn-gold:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }

      .btn-outline {
        border: 1.5px solid var(--forest);
        color: var(--forest);
        padding: 0.8rem 2rem;
        background: transparent;
      }
      .btn-outline:hover {
        background: var(--forest);
        color: #fff;
      }

      .btn-outline-gold {
        border: 1.5px solid var(--gold);
        color: var(--gold);
        padding: 0.8rem 2rem;
        background: transparent;
      }
      .btn-outline-gold:hover {
        background: var(--gold);
        color: #fff;
      }

      /* ── LABEL ── */
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.68rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 500;
        margin-bottom: 1rem;
      }
      .eyebrow::before,
      .eyebrow::after {
        content: "";
        display: block;
        width: 24px;
        height: 1px;
        background: var(--gold-lt);
        opacity: 0.6;
      }

      /* ── CARDS ── */
      .card {
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
        overflow: hidden;
      }

      /* ── DIVIDER ── */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border-gold),
          transparent
        );
        border: none;
        margin: 0;
      }

      /* ── GOLD RULE ── */
      .gold-rule {
        width: 48px;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-lt));
        border-radius: 2px;
        margin-bottom: 1.5rem;
      }

      /* ── NAV ── */
      /* ── LOGO LOCK — identical on every device ── */
      .nav-logo-circle {
        width: 40px !important;
        height: 40px !important;
        flex-shrink: 0 !important;
      }
      .nav-logo-name {
        font-weight: 600 !important;
        font-size: 1.05rem !important;
        letter-spacing: 0.02em !important;
        white-space: nowrap;
      }
      .nav-logo-sub {
        display: block !important;
        font-size: 0.6rem !important;
        letter-spacing: 0.28em !important;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .nav-link {
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        transition: color 0.2s;
        font-weight: 500;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: #fff;
      }

      .nav-link-dark {
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
        font-weight: 500;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .nav-link-dark:hover {
        color: var(--forest);
      }

      /* ── FORM ── */
      .field {
        width: 100%;
        background: var(--cream);
        border: 1.5px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 0.8rem 1rem;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
      }
      .field::placeholder {
        color: var(--soft);
      }
      .field:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.12);
        background: var(--white);
      }
      .field option {
        background: var(--white);
        color: var(--text);
      }

      /* ── TABLE ── */
      .rate-table {
        width: 100%;
        border-collapse: collapse;
      }
      .rate-table th {
        text-align: left;
        padding: 1rem 1.25rem;
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 600;
        border-bottom: 1px solid var(--border-gold);
        background: var(--cream2);
      }
      .rate-table td {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }
      .rate-table tr:last-child td {
        border-bottom: none;
      }
      .rate-table tbody tr {
        transition: background 0.15s;
      }
      .rate-table tbody tr:hover td {
        background: var(--cream);
      }
      .rate-table .vname {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.05rem;
        color: var(--forest);
        font-weight: 600;
      }

      /* ── FLEET IMAGE ── */
      .fleet-img {
        width: 100%;
        aspect-ratio: 3/2;
        object-fit: cover;
        display: block;
        transition: transform 0.45s ease;
      }
      .fleet-card:hover .fleet-img {
        transform: scale(1.04);
      }

      /* ── ACCORDION ── */
      details {
        border-bottom: 1px solid var(--border);
      }
      details:last-child {
        border-bottom: none;
      }
      details > summary {
        list-style: none;
        cursor: pointer;
        padding: 1.1rem 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.9375rem;
        color: var(--forest);
        font-weight: 500;
        user-select: none;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      .chev {
        transition: transform 0.2s;
        color: var(--gold);
        flex-shrink: 0;
      }
      details[open] .chev {
        transform: rotate(180deg);
      }
      details > div {
        padding-bottom: 1rem;
        font-size: 0.875rem;
        color: var(--muted);
        line-height: 1.75;
      }

      /* ── HERO ── */
      .hero-wrap {
        position: relative;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden;
      }
      .hero-bg-img {
        position: absolute;
        inset: 0;
        /* https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=1900&q=85 */
        background: url("./hero.webp") center/cover no-repeat;
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(10, 20, 12, 0.55) 0%,
          rgba(10, 20, 12, 0.3) 35%,
          rgba(10, 20, 12, 0.55) 65%,
          rgba(249, 245, 239, 1) 100%
        );
      }
      .hero-content {
        position: relative;
        padding: 6rem 0 4rem;
        text-align: center;
      }

      /* ── STAT BAR ── */
      .stat-bar {
        display: flex;
        gap: 0;
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .stat-item {
        flex: 1;
        padding: 1.5rem 1rem;
        text-align: center;
        border-right: 1px solid var(--border);
      }
      .stat-item:last-child {
        border-right: none;
      }

      /* ── SERVICE GRID ── */
      .service-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
        gap: 1.5px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .service-cell {
        background: var(--white);
        padding: 2rem 1.75rem;
        transition: background 0.2s;
        cursor: default;
      }
      .service-cell:hover {
        background: var(--cream);
      }

      /* ── FLEET GRID ── */
      .fleet-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
        gap: 1.5rem;
      }

      /* ── ZERO TOLERANCE ACCORDION (dark) ── */
      .zt-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .zt-item:last-child {
        border-bottom: none;
      }
      .zt-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 0;
        cursor: pointer;
        font-size: 0.9375rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        user-select: none;
        list-style: none;
      }
      .zt-summary::-webkit-details-marker {
        display: none;
      }
      .zt-chev {
        transition: transform 0.2s;
        color: var(--gold-lt);
        flex-shrink: 0;
      }
      .zt-item[open] .zt-chev {
        transform: rotate(180deg);
      }
      .zt-body {
        padding-bottom: 1rem;
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.8;
      }

      /* ── NAV BAR RESPONSIVE ── */
      /* The nav-inner is .container inside the header — controls height + spacing */
      .nav-inner {
        height: 76px;
        padding: 0 2rem; /* explicit to override .container default at all sizes */
      }
      @media (max-width: 1024px) {
        .nav-inner {
          padding: 0 1.5rem;
        }
      }
      @media (max-width: 768px) {
        .nav-inner {
          height: 66px;
          padding: 0 1.25rem;
        }
      }
      @media (max-width: 480px) {
        .nav-inner {
          height: 62px;
          padding: 0 1rem;
        }
      }
      @media (max-width: 375px) {
        .nav-inner {
          height: 58px;
          padding: 0 0.875rem;
        }
        /* Tighten hamburger button */
        .mobile-btn {
          padding: 0.38rem 0.5rem !important;
        }
      }
      @media (max-width: 320px) {
        .nav-inner {
          height: 54px;
          padding: 0 0.75rem;
        }
        /* Logo stays identical — no hiding or shrinking */
      }

      /* ── RESPONSIVE NAV ── */
      @media (max-width: 768px) {
        .desktop-nav {
          display: none !important;
        }
        .mobile-btn {
          display: flex !important;
        }
        section {
          padding: 4rem 0;
        }
        .hero-content {
          padding: 6rem 0 3rem;
        }
        /* Booking card better padding on tablet/mobile */
        .book-card {
          padding: 1.75rem !important;
        }
        /* Prevent rate table from pushing layout on tablet */
        .rate-table th,
        .rate-table td {
          padding: 0.85rem 0.9rem;
          font-size: 0.85rem;
        }
        /* Service areas map stacks above tags on mobile */
        .grid-map {
          gap: 1.75rem !important;
        }
      }
      @media (min-width: 769px) {
        .mobile-btn {
          display: none !important;
        }
      }

      /* ── NAV 769–1023px: CENTERED layout ── */
      @media (min-width: 769px) and (max-width: 1023px) {
        .nav-inner {
          justify-content: center !important;
          gap: 1.25rem;
          padding: 0 1.25rem !important;
        }
        .desktop-nav {
          gap: 0.75rem !important;
        }
        .nav-link,
        .nav-link-dark {
          font-size: 0.66rem;
          letter-spacing: 0.035em;
          white-space: nowrap; /* stop links from wrapping to 2 lines */
        }
        .desktop-nav .btn {
          padding: 0.5rem 1rem !important;
          font-size: 0.68rem !important;
          white-space: nowrap;
        }
      }

      /* ── NAV 1024–1100px: compressed space-between ── */
      @media (min-width: 1024px) and (max-width: 1100px) {
        .desktop-nav {
          gap: 1rem !important;
        }
        .nav-link,
        .nav-link-dark {
          font-size: 0.7rem;
          letter-spacing: 0.04em;
          white-space: nowrap;
        }
        .desktop-nav .btn {
          padding: 0.55rem 1.1rem !important;
          font-size: 0.72rem !important;
        }
        .container {
          padding: 0 1.25rem;
        }
      }

      /* ════════════════════════════════════════════════
         SURFACE PRO 7
         Landscape: ~1368px  |  Portrait: ~912px
         Both are touch screens — keep tap targets at 44px+
         ════════════════════════════════════════════════ */

      /* Portrait mode — 769 to 960px */
      @media (min-width: 769px) and (max-width: 960px) {
        .nav-inner {
          height: 70px !important;
          padding: 0 1.25rem !important;
        }
        section {
          padding: 5rem 0;
        }
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 1.5rem;
        }
        /* Touch targets for stylus/finger use */
        .btn {
          min-height: 44px;
        }
        .field {
          min-height: 44px;
          font-size: 1rem;
        }
        /* Stat bar — all 4 in one row */
        .stat-bar {
          flex-wrap: nowrap !important;
        }
        .stat-item {
          flex: 1 !important;
          border-right: 1px solid var(--border) !important;
          border-bottom: none !important;
        }
        .stat-item:last-child {
          border-right: none !important;
        }
        /* 2-column service cards */
        .service-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        /* Fleet 2-col */
        .fleet-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        /* Keep 2-col form rows */
        .grid-2col {
          grid-template-columns: 1fr 1fr !important;
        }
        /* 3-col form rows collapse to 2-col (avoid cramping) */
        .grid-3col {
          grid-template-columns: 1fr 1fr !important;
        }
        /* Map side-by-side */
        .grid-map {
          grid-template-columns: 1fr 1fr !important;
        }
        .book-card {
          padding: 2rem !important;
        }
      }

      /* Landscape — 961 to 1400px covers Surface Pro landscape & common tablets */
      @media (min-width: 961px) and (max-width: 1400px) {
        .nav-inner {
          height: 72px !important;
        }
        /* Slightly wider container cap for the 1368px viewport */
        .container {
          max-width: 1200px;
        }
        .container--narrow {
          max-width: 820px;
        }
        .container--mid {
          max-width: 980px;
        }
        /* Touch targets */
        .btn {
          min-height: 44px;
        }
        .field {
          min-height: 44px;
        }
        /* 3-col service grid */
        .service-grid {
          grid-template-columns: repeat(3, 1fr) !important;
        }
        /* Fleet 2-col */
        .fleet-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
      }

      /* ════════════════════════════════════════════════
         SURFACE DUO
         Folded  : ~540 × 720 dp  (one screen, mobile nav)
         Unfolded: ~1114 × 720 dp (spanning two panes)
         ════════════════════════════════════════════════ */

      /* Folded — single screen, 481–540px */
      @media (min-width: 481px) and (max-width: 540px) {
        .nav-inner {
          height: 64px !important;
          padding: 0 1.25rem !important;
        }
        .container,
        .container--narrow,
        .container--mid {
          padding: 0 1.25rem;
        }
        section {
          padding: 3.75rem 0;
        }
        /* More horizontal room than a phone — restore 2-col form rows */
        .grid-2col {
          grid-template-columns: 1fr 1fr !important;
        }
        /* Service grid 2-col */
        .service-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        /* CTAs side-by-side at 540px — enough room */
        .hero-ctas {
          flex-direction: row !important;
          align-items: stretch !important;
          padding: 0 0.25rem;
        }
        .hero-ctas a {
          flex: 1 !important;
          width: auto !important;
        }
        /* Stat bar — all 4 in a row */
        .stat-bar {
          flex-wrap: nowrap !important;
        }
        .stat-item {
          flex: 1 !important;
          border-right: 1px solid var(--border) !important;
          border-bottom: none !important;
        }
        .stat-item:last-child {
          border-right: none !important;
        }
        .stat-item .serif {
          font-size: 1.5rem !important;
        }
        .book-card {
          padding: 1.5rem !important;
        }
        .map-iframe {
          height: 300px !important;
        }
      }

      /* Unfolded spanning — CSS fold API (progressive enhancement) */
      /* Modern syntax: Chrome 100+, Edge 100+ with flag */
      @media (horizontal-viewport-segments: 2) {
        /* Nav stretches across both panes normally */

        /* Hero spans both panes */
        .hero-wrap {
          grid-column: span 2;
        }

        /* Sections: left pane gets content, right pane gets image/form */
        .grid-map {
          grid-template-columns:
            env(viewport-segment-width, 0, 0)

          grid-template-columns: 1fr !important;

      /* ── BOOK ── */
      function Book() {
        const [form, setForm] = useState({
          firstName: "",
          lastName: "",
          email: "",
          phone: "",
          pickup: "",
          dropoff: "",
          stops: "",
          date: "",
          time: "",
          returnTrip: "No return trip",
          passengers: "2",
          vehicle: "Luxury SUV",
          occasion: "Airport Transfer",
          notes: "",
          agree: false,
        });
        const [sent, setSent] = useState(false);
        const [loading, setLoading] = useState(false);
        const [errMsg, setErrMsg] = useState("");

        const set = (k) => (e) =>
          setForm({
            ...form,
            [k]:
              e.target.type === "checkbox" ? e.target.checked : e.target.value,
          });

        const submit = async (e) => {
          e.preventDefault();
          if (!form.agree) {
            setErrMsg(
              "Please read and acknowledge the Zero Tolerance Policy before submitting.",
            );
            return;
          }
          setErrMsg("");
          setLoading(true);

          const templateParams = {
            from_name: `${form.firstName} ${form.lastName}`,
            from_email: form.email,
            phone: form.phone,
            pickup: form.pickup,
            dropoff: form.dropoff,
            stops: form.stops || "None",
            date: form.date,
            time: form.time,
            return_trip: form.returnTrip,
            passengers: form.passengers,
            vehicle: form.vehicle,
            occasion: form.occasion,
            notes: form.notes || "None",
          };

          try {
            await emailjs.send(
              window.EMAILJS_SERVICE_ID,
              window.EMAILJS_TEMPLATE_ID,
              templateParams,
            );
            setSent(true);
          } catch (err) {
            console.error("EmailJS error:", err);
            setErrMsg(
              "We couldn't send your request right now. Please call us at " +
                "(469) 400-0777 or email amkristian91@yahoo.com directly.",
            );
          } finally {
            setLoading(false);
          }
        };

        if (sent)
          return (
